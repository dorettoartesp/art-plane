name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Validate Makefile targets
        run: make --dry-run dev-setup dev-up dev-down dev-reset dev-logs dev-ps plane-install check-web check-admin check-space build-web build-admin build-space dev-build-source dev-build-source-ui dev-build-source-web dev-build-source-admin dev-build-source-space smoke

      - name: Validate Docker Compose config
        run: docker compose --project-name art-plane-ci --env-file .env.example --file plane/deployments/cli/community/docker-compose.yml config --quiet

      - name: Validate Plane ARTESP skill
        run: python scripts/validate_skill.py .agents/skills/plane-artesp

      - name: Check required docs
        run: |
          test -s README.md
          test -s COMPLIANCE.md
          test -s VERSION.md
          test -s CHANGELOG.md
          test -s docs/runbooks/install.md
          test -s docs/runbooks/update-upstream.md
          test -s docs/runbooks/deploy.md
          test -s docs/runbooks/backup.md
          test -s docs/runbooks/restore.md

      - name: Check Plane source is vendored
        run: |
          test -f plane/package.json
          test -f plane/docker-compose.yml
          if git ls-files -s | awk '$1 == 160000 { found=1 } END { exit found ? 0 : 1 }'; then
            echo "Submodules/gitlinks are not allowed." >&2
            exit 1
          fi
